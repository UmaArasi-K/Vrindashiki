# ================================================================
# Cloud Build — Vrindashiki CI/CD
#
# Triggered automatically on push to the connected repository.
# Steps:
#   1. Build the Docker image (multi-stage)
#   2. Push to Artifact Registry
#   3. Deploy to Cloud Run
#
# Before using this file:
#   • Replace PROJECT_ID below with your actual GCP project ID,
#     OR ensure the Cloud Build trigger substitution $_PROJECT_ID is set.
#   • Adjust REGION if you prefer a different Cloud Run region.
#   • Grant the Cloud Build service account these IAM roles:
#       - Cloud Run Admin
#       - Service Account User
#       - Artifact Registry Writer
# ================================================================

substitutions:
  _REGION: us-central1
  _SERVICE_NAME: vrindashiki
  _IMAGE: gcr.io/$PROJECT_ID/vrindashiki

steps:
  # ── Step 1: Build the image ───────────────────────────────────
  - name: 'gcr.io/cloud-builders/docker'
    id: 'build'
    args:
      - build
      - '--no-cache'
      - '-t'
      - '${_IMAGE}:$COMMIT_SHA'
      - '-t'
      - '${_IMAGE}:latest'
      - '-f'
      - 'Dockerfile'
      - '.'
    timeout: '900s'

  # ── Step 2: Push image to Container Registry ──────────────────
  - name: 'gcr.io/cloud-builders/docker'
    id: 'push'
    args:
      - push
      - '--all-tags'
      - '${_IMAGE}'
    waitFor: ['build']

  # ── Step 3: Deploy to Cloud Run ───────────────────────────────
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: 'deploy'
    entrypoint: gcloud
    args:
      - run
      - deploy
      - '${_SERVICE_NAME}'
      - '--image=${_IMAGE}:$COMMIT_SHA'
      - '--region=${_REGION}'
      - '--platform=managed'
      - '--allow-unauthenticated'
      - '--port=8080'
      - '--memory=512Mi'
      - '--cpu=1'
      - '--min-instances=0'
      - '--max-instances=10'
      - '--set-env-vars=NODE_ENV=production'
    waitFor: ['push']

# Push the final image as a build artifact
images:
  - '${_IMAGE}:$COMMIT_SHA'
  - '${_IMAGE}:latest'

# Build timeout (15 min covers npm install + tsc + vite build)
timeout: '1200s'

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: 'E2_HIGHCPU_8'
